name: Daily data refresh

# Runs every day at 04:00 UTC (approx. 10-11pm US Central depending on DST).
# Daily cadence is required to capture Instagram Stories, which Meta only
# exposes while they're still active (24h window).
#
# The reporting window is always "trailing 7 days ending yesterday UTC" — the
# dashboard view remains a 7-day snapshot, just refreshed daily.

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch: # allow manual triggering from the Actions tab

permissions:
  contents: write
  issues: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: scripts
        run: npm install

      - name: Run daily refresh
        working-directory: scripts
        env:
          APIFY_TOKEN:      ${{ secrets.APIFY_TOKEN }}
          META_IG_TOKEN:    ${{ secrets.META_IG_TOKEN }}
          META_PAGE_TOKEN:  ${{ secrets.META_PAGE_TOKEN }}
          META_PAGE_ID:     ${{ secrets.META_PAGE_ID }}
          YT_API_KEY:       ${{ secrets.YT_API_KEY }}
          YT_CLIENT_ID:     ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: npm run refresh

      - name: Commit updated data
        run: |
          git config user.name "dashboard-bot"
          git config user.email "dashboard-bot@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore(data): daily refresh $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `Daily refresh failed — ${new Date().toISOString().slice(0,10)}`,
              body:  `The daily refresh job failed. Check the Actions tab for logs:\n\n${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
