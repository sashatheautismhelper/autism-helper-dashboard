name: Weekly data refresh

on:
  schedule:
    # Sundays at 11:00 PM US Central (04:00 UTC Monday) year-round.
    - cron: "0 4 * * 1"
  workflow_dispatch: # allow manual triggering from the Actions tab

permissions:
  contents: write
  issues: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: scripts
        run: npm install

      - name: Run weekly refresh
        working-directory: scripts
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: npm run refresh

      - name: Commit updated data
        run: |
          git config user.name "dashboard-bot"
          git config user.email "dashboard-bot@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore(data): weekly refresh $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `Weekly refresh failed — ${new Date().toISOString().slice(0,10)}`,
              body:  `The Sunday refresh job failed. Check the Actions tab for logs:\n\n${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
